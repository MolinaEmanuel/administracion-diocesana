<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración Diocesana — Ingresar</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link rel="icon" href="assets/images/logo-gnosis.png" type="image/png">

<style>
#page-loader {
  position: fixed;
  inset: 0;
  background: #1A1A2A;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 40px;
  transition: opacity 0.6s ease, visibility 0.6s ease;
}
#page-loader.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.loader-logo-wrap {
  position: relative;
  width: 130px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* Anillo giratorio tricolor */
.loader-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 3px solid transparent;
  background:
    linear-gradient(#1A1A2A, #1A1A2A) padding-box,
    conic-gradient(
      #1C2E4A 0deg 120deg,
      #B44637 120deg 240deg,
      #D4A847 240deg 360deg
    ) border-box;
  animation: ringRotate 2.5s linear infinite;
}
/* Logo con efecto de brillo en flamas */
.loader-logo-img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  position: relative;
  z-index: 2;
  animation: logoGlow 2.5s ease-in-out infinite;
  filter: drop-shadow(0 0 0px rgba(212,168,71,0));
}
@keyframes ringRotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes logoGlow {
  0%   { filter: drop-shadow(0 0 0px  rgba(212,168,71,0));   transform: scale(1); }
  30%  { filter: drop-shadow(0 0 8px  rgba(212,168,71,0.6)) 
                 drop-shadow(0 0 4px  rgba(180,70,55,0.4));  transform: scale(1.04); }
  60%  { filter: drop-shadow(0 0 14px rgba(28,46,74,0.7))
                 drop-shadow(0 0 6px  rgba(212,168,71,0.5)); transform: scale(1.02); }
  100% { filter: drop-shadow(0 0 0px  rgba(212,168,71,0));   transform: scale(1); }
}
.loader-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  animation: textPulse 2.5s ease-in-out infinite;
}
@keyframes textPulse {
  0%, 100% { opacity: 0.3; }
  50%       { opacity: 0.7; }
}
</style>
</head>
<body>
  <!-- Loader solo en login/index -->
  <div id="page-loader">
    <div class="loader-logo-wrap">
      <div class="loader-ring"></div>
      <img class="loader-logo-img" src="assets/images/logo-gnosis.png" alt="Cargando..."/>
    </div>
    <div class="loader-text">Cargando</div>
  </div>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const l = document.getElementById('page-loader');
        if (l) l.classList.add('hidden');
      }, 1400);
    });
  </script>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/images/logo-gnosis.png" alt="Logo Gnosis" style="width:130px;height:130px;object-fit:contain;margin-bottom:7px"/>
        <h1>Administración Diocesana TDF y Sur de Santa Cruz</h1>
        <p>Ingresá con tu cuenta autorizada</p>
      </div>
      <div id="alert" class="alert alert-danger"></div>
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="usuario@diocesis.org"/>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>
      <button class="btn btn-primary btn-full" id="btnLogin">
        <i class="ti ti-login"></i> Ingresar
      </button>
    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'dashboard.html';
    });

    document.getElementById('btnLogin').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alert    = document.getElementById('alert');
      alert.classList.remove('show');

      if (!email || !password) {
        alert.textContent = 'Completá todos los campos.';
        alert.classList.add('show');
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (e) {
        alert.textContent = 'Correo o contraseña incorrectos.';
        alert.classList.add('show');
      }
    });
  </script>
</body>
</html>
