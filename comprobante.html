<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Administración Diocesana — Comprobante</title>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .comprobante-wrap { max-width: 720px; margin: 0 auto; }
    .recibo {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 48px;
      box-shadow: var(--shadow);
    }
    .recibo-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; border-bottom: 2px solid var(--primary); padding-bottom: 20px; }
    .recibo-logo h2 { font-family: 'Lora', serif; font-size: 20px; color: var(--primary); font-weight: 600; }
    .recibo-logo p  { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .recibo-num { text-align: right; }
    .recibo-num .num { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; color: var(--primary); }
    .recibo-num .fecha { font-size: 12px; color: var(--text-muted); }
    .recibo-section { margin-bottom: 24px; }
    .recibo-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
    .recibo-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
    .recibo-row .key { color: var(--text-muted); }
    .recibo-row .val { font-weight: 500; color: var(--text); }
    .monto-grande { text-align: center; padding: 20px; background: var(--primary-pale); border-radius: var(--radius); margin: 24px 0; }
    .monto-grande .label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 4px; }
    .monto-grande .valor { font-family: 'Lora', serif; font-size: 36px; font-weight: 600; color: var(--primary); }
    .firmantes { display: flex; justify-content: center; margin-top: 40px; min-width: 200px; }
    .firmante { text-align: center; }
    .firmante .linea { border-top: 1px solid var(--text); padding-top: 6px; margin-top: 32px; }
    .firmante .nombre { font-size: 13px; font-weight: 500; color: var(--text); }
    .firmante .cargo  { font-size: 11px; color: var(--text-muted); }
    .recibo-footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: var(--text-light); }
    @media print {
      .topbar, .sidebar, .topbar-actions, .no-print { display: none !important; }
      .main-content { margin-left: 0 !important; }
      .page-content { padding: 0 !important; }
      .recibo { border: none; box-shadow: none; padding: 20px; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="tricolor-bar"></div>
    <div class="topbar no-print">
      <div class="topbar-title">
        <h1>Comprobantes de pago</h1>
        <p id="subtitulo">Recibos</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" onclick="history.back()"><i class="ti ti-arrow-left"></i> Volver</button>
        <button class="btn btn-secondary" onclick="window.print()"><i class="ti ti-printer"></i> Imprimir</button>
        <button class="btn btn-primary" id="btnPDF"><i class="ti ti-file-download"></i> Descargar PDF</button>
      </div>
    </div>
    <div class="page-content">
      <div class="comprobante-wrap">
        <div id="recibo" class="recibo">
          <div class="empty-state"><i class="ti ti-loader"></i><p>Cargando comprobante...</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, getFirmanteByEmail } from './js/auth.js';
  import { registrarHistorial } from './js/historial.js';
  import { db } from './js/firebase-config.js';
  import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  let datosPago = null;

  requireAuth(async (user, firmanteParam) => {
    const params = new URLSearchParams(window.location.search);
    const pagoId = params.get('pago');
    if (!pagoId) {
      document.getElementById('recibo').innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>No se especificó un pago.</p></div>`;
      return;
    }

    const [pagoSnap, configSnap] = await Promise.all([
      getDoc(doc(db, 'pagos', pagoId)),
      getDoc(doc(db, 'config', 'diocesis')),
    ]);

    if (!pagoSnap.exists()) {
      document.getElementById('recibo').innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>Pago no encontrado.</p></div>`;
      return;
    }

    datosPago = { id: pagoSnap.id, ...pagoSnap.data() };
    // Usar firmante del requireAuth, o buscarlo si no vino
    const firmanteActual = firmanteParam || await getFirmanteByEmail(user.email);
    const config = configSnap.exists() ? configSnap.data() : {};

    // Guardar datos del firmante para el PDF
    window._firmanteActualNombre = firmanteActual?.nombre || '';
    window._firmanteActualCargo  = firmanteActual?.cargo  || '';

    // Registrar emisión en historial
    await registrarHistorial('comprobante', 'emision',
      `Comprobante visualizado: ${datosPago.miembroNombre} — $${datosPago.monto} (${datosPago.periodo})`,
      { pagoId: datosPago.id, miembro: datosPago.miembroNombre, monto: datosPago.monto, lumisial: datosPago.parroquia }
    );

    document.getElementById('subtitulo').textContent = `${datosPago.miembroNombre} — ${datosPago.fecha?.toDate().toLocaleDateString('es-AR')}`;

    const fecha    = datosPago.fecha?.toDate();
    const fechaStr = fecha ? fecha.toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' }) : '—';
    const nroComp  = datosPago.id.substring(0, 8).toUpperCase();
    const montoStr = `$${(datosPago.monto || 0).toLocaleString('es-AR')}`;

    const firmantesHTML = firmanteActual
      ? `<div class="firmante">
            ${firmanteActual.firma
              ? `<div style="height:50px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:4px">
                   <img src="${firmanteActual.firma}" alt="Firma" style="max-height:48px;max-width:140px;object-fit:contain"/>
                 </div>`
              : '<div style="height:54px"></div>'}
            <div class="linea">
              <div class="nombre">${firmanteActual.nombre}</div>
              <div class="cargo">${firmanteActual.cargo}</div>
            </div>
          </div>`
      : `<div class="firmante">
           <div style="height:54px"></div>
           <div class="linea">
             <div class="nombre">_______________</div>
             <div class="cargo">Firmante autorizado</div>
           </div>
         </div>`;

    document.getElementById('recibo').innerHTML = `
      <div class="recibo-header">
        <div class="recibo-logo">
          <h2>${config.nombre || 'Diócesis'}</h2>
          <p>${config.direccion || ''}</p>
          <p>${config.ciudad || ''}</p>
        </div>
        <div class="recibo-num">
          <div class="num">N° ${nroComp}</div>
          <div class="fecha">${fechaStr}</div>
        </div>
      </div>

      <div class="recibo-section">
        <h3>Datos del contribuyente</h3>
        <div class="recibo-row"><span class="key">Nombre y apellido</span><span class="val">${datosPago.miembroNombre || '—'}</span></div>
        <div class="recibo-row"><span class="key">Lumisial</span><span class="val">${datosPago.parroquia || '—'}</span></div>
        <div class="recibo-row"><span class="key">Período</span><span class="val">${datosPago.periodo || '—'}</span></div>
      </div>

      <div class="recibo-section">
        <h3>Detalle del pago</h3>
        <div class="recibo-row"><span class="key">Concepto</span><span class="val">${datosPago.concepto || 'Diezmo'}</span></div>
        <div class="recibo-row"><span class="key">Estado</span><span class="val">${datosPago.estado === 'pagado' ? 'Pagado' : 'Pendiente'}</span></div>
        ${datosPago.observaciones ? `<div class="recibo-row"><span class="key">Observaciones</span><span class="val">${datosPago.observaciones}</span></div>` : ''}
      </div>

      <div class="monto-grande">
        <div class="label">Total recibido</div>
        <div class="valor">${montoStr}</div>
      </div>

      <div class="firmantes">${firmantesHTML}</div>

      <div class="recibo-footer">
        Este comprobante acredita la recepción de la donación o diezmo indicado.<br>
        ${config.nombre || 'Diócesis'} — Organización sin fines de lucro.
        <div style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--border);font-style:italic;color:var(--text-muted);font-size:11px;line-height:1.6">
          "La caridad no es una simple limosna, sino una expresión viva del Cristo interior,<br>
          y el pilar fundamental del sacrificio por la humanidad."<br>
          <span style="font-style:normal;font-weight:500;font-size:10px;color:var(--text-light);display:block;margin-top:4px">— Samael Aun Weor</span>
        </div>
      </div>`;
  });

  // PDF generation
  document.getElementById('btnPDF').addEventListener('click', async () => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'mm', format: 'a4' });

    if (!datosPago) return;

    const p      = datosPago;
    const fecha  = p.fecha?.toDate().toLocaleDateString('es-AR', { day:'2-digit', month:'long', year:'numeric' }) || '—';
    const nro    = p.id.substring(0, 8).toUpperCase();
    const monto  = `$${(p.monto || 0).toLocaleString('es-AR')}`;

    // ── Colores institucionales ──────────────────────────────
    const AZUL    = [28, 46, 74];
    const ROJO    = [180, 70, 55];
    const AMARILLO= [212, 168, 71];
    const CREMA   = [245, 240, 232];
    const GRIS    = [130, 128, 112];

    // ── Barra tricolor superior ──────────────────────────────
    pdf.setFillColor(...AZUL);
    pdf.rect(0, 0, 70, 8, 'F');
    pdf.setFillColor(...ROJO);
    pdf.rect(70, 0, 70, 8, 'F');
    pdf.setFillColor(...AMARILLO);
    pdf.rect(140, 0, 70, 8, 'F');

    // ── Header: logo + título ────────────────────────────────
    pdf.setFillColor(...CREMA);
    pdf.rect(0, 8, 210, 30, 'F');

    // Logo
    try {
      const logoUrl  = window.location.href.replace(/[^/]*$/, '') + 'assets/logo-gnosis.png';
      const response = await fetch(logoUrl);
      const blob     = await response.blob();
      const b64      = await new Promise(res => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.readAsDataURL(blob);
      });
      pdf.addImage(b64, 'PNG', 8, 10, 22, 22);
    } catch(e) {}

    pdf.setTextColor(...AZUL);
    pdf.setFontSize(14);
    pdf.setFont('helvetica', 'bold');
    pdf.text('Comprobante de Pago', 34, 19);
    pdf.setFontSize(9);
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(...GRIS);
    pdf.text('Administración Diocesana TDF y Sur de Santa Cruz', 34, 25);

    // N° y fecha alineados a la derecha
    pdf.setFontSize(10);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(...AZUL);
    pdf.text(`N° ${nro}`, 200, 17, { align: 'right' });
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(9);
    pdf.setTextColor(...GRIS);
    pdf.text(fecha, 200, 23, { align: 'right' });

    // ── Línea separadora ─────────────────────────────────────
    pdf.setDrawColor(...AZUL);
    pdf.setLineWidth(0.4);
    pdf.line(10, 40, 200, 40);

    // ── Sección datos del contribuyente ──────────────────────
    let y = 48;
    pdf.setFontSize(8);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(...ROJO);
    pdf.text('DATOS DEL CONTRIBUYENTE', 10, y);
    pdf.setDrawColor(220, 215, 205);
    pdf.setLineWidth(0.2);
    pdf.line(10, y + 2, 200, y + 2);

    y += 9;
    const campos = [
      ['Nombre y apellido', p.miembroNombre || '—'],
      ['Lumisial',          p.parroquia     || '—'],
      ['Período',           p.periodo       || '—'],
    ];
    campos.forEach(([key, val]) => {
      pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(...GRIS);
      pdf.setFontSize(9);
      pdf.text(key, 10, y);
      pdf.setFont('helvetica', 'bold');
      pdf.setTextColor(...AZUL);
      pdf.text(val, 65, y);
      y += 8;
    });

    // ── Sección detalle del pago ─────────────────────────────
    y += 4;
    pdf.setFontSize(8);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(...ROJO);
    pdf.text('DETALLE DEL PAGO', 10, y);
    pdf.setDrawColor(220, 215, 205);
    pdf.setLineWidth(0.2);
    pdf.line(10, y + 2, 200, y + 2);

    y += 9;
    const detalle = [
      ['Concepto', p.concepto || 'Diezmo'],
      ['Estado',   p.estado === 'pagado' ? 'Pagado' : 'Pendiente'],
    ];
    if (p.observaciones) detalle.push(['Observaciones', p.observaciones]);
    detalle.forEach(([key, val]) => {
      pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(...GRIS);
      pdf.setFontSize(9);
      pdf.text(key, 10, y);
      pdf.setFont('helvetica', 'bold');
      pdf.setTextColor(...AZUL);
      pdf.text(val, 65, y);
      y += 8;
    });

    // ── Caja monto ───────────────────────────────────────────
    y += 6;
    pdf.setFillColor(...CREMA);
    pdf.setDrawColor(...AMARILLO);
    pdf.setLineWidth(0.6);
    pdf.roundedRect(10, y, 190, 22, 3, 3, 'FD');
    pdf.setTextColor(...GRIS);
    pdf.setFontSize(8);
    pdf.setFont('helvetica', 'normal');
    pdf.text('TOTAL RECIBIDO', 105, y + 7, { align: 'center' });
    pdf.setFontSize(20);
    pdf.setFont('helvetica', 'bold');
    pdf.setTextColor(...AZUL);
    pdf.text(monto, 105, y + 17, { align: 'center' });

    // ── Firma ────────────────────────────────────────────────
    y += 34;
    const firmaX = 105; // centrada (un solo firmante)

    // Intentar cargar imagen de firma del firmante actual
    let firmaLoaded = false;
    try {
      const firmaEl = document.querySelector('.firmantes img');
      if (firmaEl) {
        const canvas  = document.createElement('canvas');
        canvas.width  = firmaEl.naturalWidth;
        canvas.height = firmaEl.naturalHeight;
        canvas.getContext('2d').drawImage(firmaEl, 0, 0);
        const firmaB64 = canvas.toDataURL('image/png');
        const fW = 50, fH = fW * (firmaEl.naturalHeight / firmaEl.naturalWidth);
        pdf.addImage(firmaB64, 'PNG', firmaX - fW/2, y, fW, fH);
        y += fH + 2;
        firmaLoaded = true;
      }
    } catch(e) {}
    if (!firmaLoaded) y += 16;

    // Línea y nombre del firmante
    pdf.setDrawColor(...AZUL);
    pdf.setLineWidth(0.3);
    pdf.line(firmaX - 30, y, firmaX + 30, y);
    if (window._firmanteActualNombre) {
      pdf.setFontSize(9);
      pdf.setFont('helvetica', 'bold');
      pdf.setTextColor(...AZUL);
      pdf.text(window._firmanteActualNombre, firmaX, y + 5, { align: 'center' });
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(8);
      pdf.setTextColor(...GRIS);
      pdf.text(window._firmanteActualCargo || '', firmaX, y + 10, { align: 'center' });
      y += 14;
    } else {
      y += 8;
    }

    // ── Footer ───────────────────────────────────────────────
    y += 10;
    pdf.setDrawColor(220, 215, 205);
    pdf.setLineWidth(0.2);
    pdf.line(10, y, 200, y);
    y += 6;

    pdf.setFontSize(8);
    pdf.setFont('helvetica', 'normal');
    pdf.setTextColor(...GRIS);
    pdf.text('Este comprobante acredita la recepción de la donación o diezmo indicado.', 105, y, { align: 'center' });
    y += 5;
    pdf.text('Organización sin fines de lucro.', 105, y, { align: 'center' });

    // Cita
    y += 10;
    pdf.setDrawColor(220, 215, 205);
    pdf.setLineWidth(0.1);
    pdf.line(40, y, 170, y);
    y += 6;
    pdf.setFontSize(7.5);
    pdf.setFont('helvetica', 'italic');
    pdf.setTextColor(...GRIS);
    const cita = '"La caridad no es una simple limosna, sino una expresión viva del Cristo interior,';
    const cita2 = 'y el pilar fundamental del sacrificio por la humanidad."';
    pdf.text(cita,  105, y,     { align: 'center' });
    pdf.text(cita2, 105, y + 5, { align: 'center' });
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(7);
    pdf.text('— Samael Aun Weor', 105, y + 11, { align: 'center' });

    pdf.save(`comprobante-${nro}.pdf`);
  });
</script>
</body>
</html>
